<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CR Digital - Inicio</title>
    <link rel="stylesheet" href="/css/global.css">
    <style>
        /* Estilos súper básicos solo para centrar el contenido */
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        .landing-container {
            padding: 2rem;
        }
    </style>
</head>
<body>

    <div class="landing-container">
        <h1>Bienvenido a CR Digital</h1>
        <p style="margin-bottom: 2rem; color: var(--text-muted);">
            Plataforma de gestión estadística y control de asistencia.
        </p>

        <a href="/login.html" class="btn btn-primary" style="font-size: 1.2rem; padding: 0.8rem 2rem;">
            Iniciar Sesión
        </a>
    </div>

    <script>
        // Pequeña mejora de experiencia de usuario:
        // Si el usuario ya había iniciado sesión antes (tiene token), 
        // le cambiamos el texto al botón para que entre directo al sistema.
        window.onload = function() {
            const token = localStorage.getItem('token');
            if (token) {
                const btn = document.querySelector('.btn-primary');
                btn.textContent = 'Ir al Panel de Control';
                btn.href = '/asistencia/semanal.html';
            }
        };
    </script>
</body>
</html>
